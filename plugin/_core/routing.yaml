# Per-task LLM routing for comp-suite v2.
#
# FORCED INHERIT (2026-06-26, David): per-task cost-tiering is DISABLED — every value
# below is `inherit`, so every dispatch runs on the parent session model (e.g. Opus 4.8
# 1M). The dispatcher passes `inherit` straight through (model_registry.get("inherit",
# "inherit")); the _core/model-registry.md series->model_id table is NOT consulted while
# routing is inherit. To re-enable tiering, restore concrete series (opus/sonnet/haiku).
#
# Resolution precedence (HIGHEST WINS) — still applies, but every level now yields inherit:
#   1. Mode override:  mode.yaml.model.overrides.<task>
#   2. Task default:   routing.yaml.tasks.<task>  (this file)
#   3. Global default: routing.yaml.default       (this file)

default: inherit                              # fallback when no task tag

tasks:
  extraction: inherit                          # find facts in N files, classify
  draft: inherit                              # initial content writing
  synthesis: inherit                            # cross-source integration, judgment
  council: inherit                              # adversarial deliberation
  research: inherit                           # Perplexity-driven (model picks how to query)
  validation: inherit                          # schema check, format check
  long_horizon: inherit                         # 50+ tool-call agentic loops
