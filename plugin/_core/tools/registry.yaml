# Comp-suite v2 tool registry — final content per SPEC § 6.
# Modes opt into tools via mode.yaml `tools_required`.
# MCP server registration lives in v2/.claude/settings.json (per CC convention);
# this file is the mode-level surface.

tools:
  # --- Perplexity — OPTIONAL enhancement -------------------------------------
  # Perplexity is NOT required by any mode. `web-search` (the WebSearch builtin,
  # below) is the guaranteed web-research path. When a colleague configures the
  # optional Perplexity server (INSTALL.md § Optional power-up), these three tools
  # become available and the protocols prefer them for richer multi-source
  # synthesis; when absent, web research falls back to `web-search`. The server is
  # optional-when-present — its tools stay registered so the refute-claim /
  # close-validation evidence paths resolve when it is configured.
  perplexity-research:
    kind: mcp
    server: perplexity
    optional: true                           # absent → protocols fall back to web-search builtin
    entry: perplexity_research
    cost_tier: high
    est_call_cost_usd: 0.30                  # consumed by budget-check primitive (SPEC § 6.1)
    requires_user_confirm: false             # set true to gate per-call within-budget
    description: Multi-source in-depth research with citations (~30s). Optional; web-search is the fallback.

  perplexity-ask:
    kind: mcp
    server: perplexity
    optional: true                           # absent → protocols fall back to web-search builtin
    entry: perplexity_ask
    cost_tier: low
    est_call_cost_usd: 0.03
    requires_user_confirm: false
    description: Quick AI-answered question with citations (~5s). Optional; web-search is the fallback.

  perplexity-reason:
    kind: mcp
    server: perplexity
    optional: true                           # absent → protocols fall back to web-search builtin
    entry: perplexity_reason
    cost_tier: medium
    est_call_cost_usd: 0.10
    requires_user_confirm: false
    description: Step-by-step analytical reasoning with citations. Optional; web-search is the fallback.

  # Market server at mcp.dallaire-jette.com/mcp/rpc (HTTP, Bearer ${MARKET_INTEL_TOKEN}).
  # All $0.00 (included in the MCP subscription). The server's live surface is far larger than the
  # mode-referenced read tools below: it also exposes the costing_*, engagement_*, brand_*, and
  # payequity_* families (registered/noted further down). Keys market-data + cba-wage-scale are
  # load-bearing (referenced by mode.yaml tools_required + prose); the other read tools mirror the
  # live tool set 1:1. Registry accuracy matters because budget-check BLOCKS any tool not found
  # here (budget-check.md step 1) — an unregistered $0 tool fails closed, not open.
  # MIM-0045 / comp-suite#1: reconciled to the live surface 2026-06-27 (was "7 live tools").
  market-search-roles:
    kind: mcp
    server: market
    entry: search_roles
    cost_tier: low
    est_call_cost_usd: 0.00
    requires_user_confirm: false
    description: Discover roles in the data (NOC codes + mined titles); returns role_id + match_score

  market-data:
    kind: mcp
    server: market
    entry: get_role_intelligence
    cost_tier: low
    est_call_cost_usd: 0.00                  # included in MCP server subscription
    requires_user_confirm: false
    description: Full rate benchmarks (StatCan + live postings, all five percentiles) + YoY trends, hourly CAD

  market-snapshot:
    kind: mcp
    server: market
    entry: get_market_snapshot
    cost_tier: low
    est_call_cost_usd: 0.00
    requires_user_confirm: false
    description: Province-wide overview of top hiring and fastest-growing roles (available; not yet wired into a protocol)

  market-compare-roles:
    kind: mcp
    server: market
    entry: compare_roles
    cost_tier: low
    est_call_cost_usd: 0.00
    requires_user_confirm: false
    description: Benchmark comparisons across multiple roles or provinces in one call

  market-compare-offer:
    kind: mcp
    server: market
    entry: compare_offer_to_market
    cost_tier: low
    est_call_cost_usd: 0.00
    requires_user_confirm: false
    description: Analysis of a single salary offer against all market signals

  market-compare-pay-scale:
