  # --- Pay-equity (server-side) — FAMILY NOTE, not enumerated ------------------
  # The market server exposes ~60 payequity_* tools (payequity_put_job_class,
  # payequity_compute_adjustments, payequity_compute_predominance, payequity_check_defensibility,
  # …). comp-suite does NOT call them: the advisor mode runs its OWN local pay-equity
  # implementation at _modes/advisor/scripts/pay_equity/tools/*.py (QC Loi sur l'équité salariale).
  # They are $0.00 (subscription-included) like every market tool. They are intentionally NOT
  # enumerated here — registering 60 unused exact names would be drift-prone noise (the very
  # problem comp-suite#1 #7 flagged). If a mode is ever wired to call a server-side payequity_*
  # tool, register that specific tool by name at that time so budget-check resolves it (an
  # unregistered tool fails closed). Canonical server contract: market-intel-mcp-server v2-facade.

  filesystem:
    kind: builtin
    est_call_cost_usd: 0.00
    description: Read/Write/Edit/Glob/Grep on local filesystem

  statute-fetch:
    kind: builtin                            # WebFetch on a cited statute URL (CNESST, LégisQuébec)
    est_call_cost_usd: 0.00                  # direct fetch — free-tier short-circuit in budget-check
    description: >
      Direct fetch of a cited statute/regulation page for the refute-claim statutory path
      (SPEC-workflow-phase1.md § 3a). $0 builtin; registered for cost-log provenance on the
      direct fetch. The paid fallback when no URL is present is perplexity-ask ($0.03).

  web-search:
    kind: builtin                            # WebSearch builtin — general web-research fallback
    est_call_cost_usd: 0.00                  # no API key; $0 builtin, available in every CC session
    description: >
      General web research via the WebSearch builtin (Job Bank Canada, Glassdoor, LinkedIn
      Salary, BLS, employer career sites). The guaranteed, key-free web-research path and the
      default fallback to the Market MCP for any value not in market data. Required by all four
      modes. When the OPTIONAL Perplexity server is configured the protocols prefer perplexity-*
      for richer multi-source synthesis; when it is absent, web research lands here.

mcp_servers:
  # market is the one REQUIRED server (the colleague sets MARKET_INTEL_TOKEN). perplexity is
  # OPTIONAL — see INSTALL.md § Optional power-up; absence degrades to the web-search builtin.
  perplexity:
    optional: true
    setup_doc: INSTALL.md#optional-power-up-perplexity   # plugin-root-relative; EN heading
  market:
    setup_doc: INSTALL.md#step-2-run-the-setup-script     # plugin-root-relative; EN heading (token is set here)
