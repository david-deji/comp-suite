    entry: compare_pay_scale_to_market
    cost_tier: low
    est_call_cost_usd: 0.00
    requires_user_confirm: false
    description: Step grid / pay band vs market benchmarks (entry/mid/top vs percentiles, competitiveness verdict)

  cba-wage-scale:
    kind: mcp
    server: market
    entry: get_cba_wage_scale
    cost_tier: low
    est_call_cost_usd: 0.00
    requires_user_confirm: false
    description: Detailed wage scales from collective agreements (unionized sectors)

  # --- Additional market read tools (live but previously unregistered) -------
  market-minimum-wage:
    kind: mcp
    server: market
    entry: get_minimum_wage
    cost_tier: low
    est_call_cost_usd: 0.00
