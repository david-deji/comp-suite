<!--
  Email header snippet for comp-comms-builder all-hands announcements.
  Inline CSS only — external stylesheets are stripped by most email clients.
  Replace placeholder values after /brand init <org-slug>.

  Placeholders:
    {{ORG_PRIMARY_COLOR}}  — hex code, e.g. #003087
    {{ORG_LOGO_URL}}       — publicly accessible image URL (Drive shared link or CDN)
    {{ORG_LOGO_ALT}}       — alt text for the logo image
    {{ORG_NAME}}           — full org name, e.g. Pharmaprix Inc.
    {{CYCLE_NAME}}         — cycle name, e.g. Examen salarial FY26
-->
<table
  role="presentation"
  width="100%"
  cellpadding="0"
  cellspacing="0"
  border="0"
  style="margin: 0; padding: 0; background-color: #ffffff;"
>
  <tr>
    <!-- Header banner row -->
    <td
      align="center"
      valign="middle"
      style="
        background-color: {{ORG_PRIMARY_COLOR}};
        padding: 16px 24px;
        border-bottom: 4px solid #cccccc;
      "
    >
      <table
        role="presentation"
        width="600"
        cellpadding="0"
        cellspacing="0"
        border="0"
        style="max-width: 600px; width: 100%;"
      >
        <tr>
          <!-- Logo cell -->
          <td
            align="left"
            valign="middle"
            width="160"
            style="padding-right: 16px;"
          >
            <img
              src="{{ORG_LOGO_URL}}"
              alt="{{ORG_LOGO_ALT}}"
              width="140"
              height="auto"
              style="
                display: block;
                border: 0;
                outline: none;
                max-width: 140px;
                height: auto;
              "
            />
          </td>
          <!-- Org name + cycle label cell -->
          <td
            align="right"
            valign="middle"
            style="padding-left: 16px;"
          >
            <p
              style="
                margin: 0;
                padding: 0;
                font-family: Arial, Helvetica, sans-serif;
                font-size: 14px;
                font-weight: bold;
                color: #ffffff;
                line-height: 1.3;
              "
            >
              {{ORG_NAME}}
            </p>
            <p
              style="
                margin: 4px 0 0 0;
                padding: 0;
                font-family: Arial, Helvetica, sans-serif;
                font-size: 11px;
                color: #e0e0e0;
                line-height: 1.3;
              "
            >
              {{CYCLE_NAME}}
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
  <!-- Spacer row below header -->
  <tr>
    <td
      height="16"
      style="font-size: 0; line-height: 0; background-color: #ffffff;"
    >&nbsp;</td>
  </tr>
</table>
<!-- END email-header.html -->
